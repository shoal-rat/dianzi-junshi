<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="760" viewBox="0 0 1400 760" role="img" aria-labelledby="title desc">
  <title id="title">电子军师决策引擎架构</title>
  <desc id="desc">从观测时间线、信念与体制假设，到学习型世界模型、推演、批评器与自然中文表达；真实结果回流学习。</desc>
  <defs>
    <filter id="shadow" x="-20%" y="-30%" width="140%" height="180%"><feDropShadow dx="0" dy="8" stdDeviation="13" flood-color="#183b76" flood-opacity=".08"/></filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0 0l10 5-10 5z" fill="#b8c1cf"/></marker>
    <linearGradient id="flow" x1="0" x2="1"><stop stop-color="#38bdf8"/><stop offset=".5" stop-color="#2563eb"/><stop offset="1" stop-color="#8b5cf6"/></linearGradient>
  </defs>
  <rect width="1400" height="760" rx="34" fill="#f8fafc"/>
  <g font-family="Inter, PingFang SC, Microsoft YaHei, sans-serif">
    <text x="56" y="62" fill="#111827" font-size="29" font-weight="760">决策引擎：先想清楚，再开口</text>
    <text x="56" y="92" fill="#7b8492" font-size="15">本机完成检索、估计、推演和选择；大模型只把选定策略写成自然中文。</text>
    <rect x="1147" y="40" width="197" height="42" rx="21" fill="#fff" stroke="#dfe5ed"/><circle cx="1171" cy="61" r="7" fill="#22c55e"/><text x="1187" y="67" fill="#475467" font-size="13" font-weight="650">每轮均可逐节点审计</text>

    <path d="M242 247H276M472 247H506M702 247H736M932 247H966M1162 247H1196" fill="none" stroke="#b8c1cf" stroke-width="2" marker-end="url(#arrow)"/>
    <path d="M1278 340v178H117" fill="none" stroke="url(#flow)" stroke-width="3" stroke-linecap="round" stroke-dasharray="7 8" marker-end="url(#arrow)" opacity=".8"/>

    <g filter="url(#shadow)">
      <rect x="48" y="145" width="194" height="204" rx="22" fill="#fff" stroke="#dfe5ed"/>
      <rect x="278" y="145" width="194" height="204" rx="22" fill="#fff" stroke="#dfe5ed"/>
      <rect x="508" y="145" width="194" height="204" rx="22" fill="#fff" stroke="#dfe5ed"/>
      <rect x="738" y="145" width="194" height="204" rx="22" fill="#fff" stroke="#dfe5ed"/>
      <rect x="968" y="145" width="194" height="204" rx="22" fill="#fff" stroke="#dfe5ed"/>
      <rect x="1198" y="145" width="154" height="204" rx="22" fill="#fff" stroke="#dfe5ed"/>
    </g>

    <g transform="translate(68 168)">
      <rect width="42" height="42" rx="13" fill="#eaf6ff"/><path d="M11 28l7-8 5 5 8-10" fill="none" stroke="#0ea5e9" stroke-width="2.7" stroke-linecap="round" stroke-linejoin="round"/>
      <text y="72" fill="#111827" font-size="19" font-weight="740">观测时间线</text>
      <text y="101" fill="#667085" font-size="13">文字 · 截图 · 真实结果</text>
      <text y="125" fill="#667085" font-size="13">沉默间隔也是信号</text>
      <rect y="148" width="150" height="28" rx="14" fill="#f0f9ff"/><text x="75" y="167" fill="#0284c7" font-size="11" text-anchor="middle">统一 token 空间</text>
    </g>
    <g transform="translate(298 168)">
      <rect width="42" height="42" rx="13" fill="#eef5ff"/><circle cx="21" cy="21" r="11" fill="none" stroke="#2563eb" stroke-width="2.5"/><path d="M21 10v11l8 5" fill="none" stroke="#2563eb" stroke-width="2.5" stroke-linecap="round"/>
      <text y="72" fill="#111827" font-size="19" font-weight="740">信念滤波</text>
      <text y="101" fill="#667085" font-size="13">九维状态 · 双时间尺度</text>
      <text y="125" fill="#667085" font-size="13">证据越多，方差越小</text>
      <rect y="148" width="151" height="28" rx="14" fill="#eff6ff"/><text x="75.5" y="167" fill="#2563eb" font-size="11" text-anchor="middle">τ 随互动节奏变化</text>
    </g>
    <g transform="translate(528 168)">
      <rect width="42" height="42" rx="13" fill="#eef5ff"/><circle cx="14" cy="15" r="4" fill="#4f6fe8"/><circle cx="29" cy="14" r="4" fill="#4f6fe8"/><circle cx="14" cy="29" r="4" fill="#4f6fe8"/><circle cx="29" cy="29" r="4" fill="#4f6fe8"/>
      <text y="72" fill="#111827" font-size="19" font-weight="740">体制假设 ×4</text>
      <text y="101" fill="#667085" font-size="13">愿意继续 · 仍在观望</text>
      <text y="125" fill="#667085" font-size="13">压力较高 · 意愿降低</text>
      <rect y="148" width="137" height="28" rx="14" fill="#eff6ff"/><text x="68.5" y="167" fill="#4f6fe8" font-size="11" text-anchor="middle">后验同时保留</text>
    </g>
    <g transform="translate(758 168)">
      <rect width="42" height="42" rx="13" fill="#f3f0ff"/><path d="M11 30c5-14 15-17 21-18M14 15c4 0 7 3 7 7m5 0c0 4 3 7 7 7" fill="none" stroke="#7c3aed" stroke-width="2.5" stroke-linecap="round"/>
      <text y="72" fill="#111827" font-size="19" font-weight="740">学习型世界模型</text>
      <text y="101" fill="#667085" font-size="13">切换动力学 + 响应头</text>
      <text y="125" fill="#667085" font-size="13">时序 CNN（诚实门控）</text>
      <rect y="148" width="143" height="28" rx="14" fill="#f5f3ff"/><text x="71.5" y="167" fill="#7c3aed" font-size="11" text-anchor="middle">只让更准的模型生效</text>
    </g>
    <g transform="translate(988 168)">
      <rect width="42" height="42" rx="13" fill="#f3f0ff"/><path d="M10 31l10-18 5 10 7-7" fill="none" stroke="#8b5cf6" stroke-width="2.7" stroke-linecap="round" stroke-linejoin="round"/>
      <text y="72" fill="#111827" font-size="19" font-weight="740">信念空间推演</text>
      <text y="101" fill="#667085" font-size="13">Kalman + Bayes 更新</text>
      <text y="125" fill="#667085" font-size="13">深度 1–3 · 精确 EVOI</text>
      <rect y="148" width="147" height="28" rx="14" fill="#f5f3ff"/><text x="73.5" y="167" fill="#7c3aed" font-size="11" text-anchor="middle">先问还是直接行动</text>
    </g>
    <g transform="translate(1218 168)">
      <rect width="42" height="42" rx="13" fill="#fff4ed"/><path d="M11 21h20M21 11v20" stroke="#f97316" stroke-width="2.6" stroke-linecap="round"/>
      <text y="72" fill="#111827" font-size="18" font-weight="740">批评与选择</text>
      <text y="101" fill="#667085" font-size="12.5">目标 · 证据</text>
      <text y="123" fill="#667085" font-size="12.5">自然度 · 风险</text>
      <rect y="148" width="116" height="28" rx="14" fill="#fff4ed"/><text x="58" y="167" fill="#ea580c" font-size="11" text-anchor="middle">胆量重塑偏好</text>
    </g>

    <g filter="url(#shadow)">
      <rect x="48" y="430" width="404" height="186" rx="24" fill="#fff" stroke="#dfe5ed"/>
      <rect x="484" y="430" width="404" height="186" rx="24" fill="#fff" stroke="#dfe5ed"/>
      <rect x="920" y="430" width="432" height="186" rx="24" fill="#fff" stroke="#dfe5ed"/>
    </g>
    <g transform="translate(74 458)">
      <circle cx="18" cy="18" r="18" fill="#eef5ff"/><path d="M11 18l5 5 10-11" fill="none" stroke="#2563eb" stroke-width="2.7" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="50" y="24" fill="#111827" font-size="20" font-weight="740">可逆优先</text>
      <text y="67" fill="#667085" font-size="14">综合情境适配、长期收益、信息价值和风险。</text>
      <text y="94" fill="#667085" font-size="14">不确定时，优先选择还能调整的动作。</text>
      <rect y="118" width="196" height="30" rx="15" fill="#eff6ff"/><text x="98" y="138" fill="#2563eb" font-size="12" text-anchor="middle">滑杆实时改变规划目标</text>
    </g>
    <g transform="translate(510 458)">
      <circle cx="18" cy="18" r="18" fill="#f3f0ff"/><path d="M10 15h16M10 22h12" stroke="#7c3aed" stroke-width="2.5" stroke-linecap="round"/>
      <text x="50" y="24" fill="#111827" font-size="20" font-weight="740">自然中文表达</text>
      <text y="67" fill="#667085" font-size="14">只把选定策略交给一次模型调用。</text>
      <text y="94" fill="#667085" font-size="14">发送前检查长度、正式程度与说教感。</text>
      <rect y="118" width="179" height="30" rx="15" fill="#f5f3ff"/><text x="89.5" y="138" fill="#7c3aed" font-size="12" text-anchor="middle">复制即可发送的回复</text>
    </g>
    <g transform="translate(946 458)">
      <circle cx="18" cy="18" r="18" fill="#ecfdf3"/><path d="M11 20l5 5 10-12" fill="none" stroke="#16a34a" stroke-width="2.7" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="50" y="24" fill="#111827" font-size="20" font-weight="740">真实结果回流</text>
      <text y="67" fill="#667085" font-size="14">响应计数 · 转移残差 · CNN 重训</text>
      <text y="94" fill="#667085" font-size="14">每条学习路径都经过保留集与损失门控。</text>
      <rect y="118" width="205" height="30" rx="15" fill="#ecfdf3"/><text x="102.5" y="138" fill="#15803d" font-size="12" text-anchor="middle">只从现实反馈中逐步更新</text>
    </g>

    <path d="M88 676H1312" stroke="#e1e6ed"/>
    <circle cx="95" cy="710" r="7" fill="#38bdf8"/><circle cx="116" cy="710" r="7" fill="#2563eb"/><circle cx="137" cy="710" r="7" fill="#8b5cf6"/>
    <text x="158" y="716" fill="#667085" font-size="14">状态信念 → 体制假设 → 动作特征 → 预测状态 → 回应分布 → 输出</text>
    <text x="1310" y="716" fill="#98a2b3" font-size="13" text-anchor="end">电子军师 v5.5</text>
  </g>
