<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 364" width="880" height="364" font-family="'PingFang SC','Microsoft YaHei','Hiragino Sans GB','Noto Sans CJK SC',sans-serif">
  <defs>
    <filter id="ss" x="-8%" y="-8%" width="116%" height="122%">
      <feDropShadow dx="0" dy="6" stdDeviation="14" flood-color="#0B1F33" flood-opacity="0.10"/>
    </filter>
    <linearGradient id="sb" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0F766E"/>
      <stop offset="1" stop-color="#0D9488"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="880" height="364" fill="#FFFFFF"/>
  <rect x="12" y="12" width="856" height="340" rx="22" fill="#FFFFFF" stroke="#E6E8EB" filter="url(#ss)"/>

  <!-- header -->
  <circle cx="48" cy="50" r="14" fill="url(#sb)"/>
  <path d="M41 50 l5 5 l9 -10" fill="none" stroke="#FFFFFF" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="72" y="56" font-size="21" font-weight="700" fill="#111827">电子军师</text>
  <text x="828" y="56" font-size="14" fill="#9AA3AF" text-anchor="end">演示 · 每次打开</text>
  <line x1="36" y1="80" x2="844" y2="80" stroke="#EEF0F2" stroke-width="1"/>

  <text x="40" y="116" font-size="18" font-weight="700" fill="#111827">你现在要聊谁？</text>

  <!-- row 1 -->
  <rect x="40" y="136" width="800" height="52" rx="12" fill="#F7F9FB" stroke="#E6E8EB"/>
  <circle cx="72" cy="162" r="15" fill="url(#sb)"/>
  <text x="72" y="167" font-size="14" font-weight="700" fill="#FFFFFF" text-anchor="middle">1</text>
  <text x="100" y="168" font-size="16" font-weight="600" fill="#111827">小美</text>
  <rect x="170" y="151" width="58" height="22" rx="11" fill="#E7F2F1"/>
  <text x="199" y="166" font-size="12" font-weight="600" fill="#0F766E" text-anchor="middle">暧昧期</text>
  <text x="812" y="167" font-size="13.5" fill="#9AA3AF" text-anchor="end">上次 3 天前</text>

  <!-- row 2 -->
  <rect x="40" y="200" width="800" height="52" rx="12" fill="#F7F9FB" stroke="#E6E8EB"/>
  <circle cx="72" cy="226" r="15" fill="url(#sb)"/>
  <text x="72" y="231" font-size="14" font-weight="700" fill="#FFFFFF" text-anchor="middle">2</text>
  <text x="100" y="232" font-size="16" font-weight="600" fill="#111827">阿强</text>
  <rect x="170" y="215" width="58" height="22" rx="11" fill="#FDF1E3"/>
  <text x="199" y="230" font-size="12" font-weight="600" fill="#B45309" text-anchor="middle">追求期</text>
  <text x="812" y="231" font-size="13.5" fill="#9AA3AF" text-anchor="end">今天聊过</text>

  <!-- row 3: new -->
  <rect x="40" y="264" width="800" height="52" rx="12" fill="#FFFFFF" stroke="#BFD3CF" stroke-width="1.5" stroke-dasharray="5 5"/>
  <circle cx="72" cy="290" r="15" fill="#E7F2F1"/>
  <path d="M66 290 h12 M72 284 v12" stroke="#0F766E" stroke-width="2.2" stroke-linecap="round"/>
  <text x="100" y="296" font-size="16" font-weight="600" fill="#0F766E">新建一个对象</text>

  <text x="40" y="340" font-size="13" fill="#9AA3AF">回数字、代号、或“新建”都行 —— 各人的事各记各的，不会串</text>
</svg>
