<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 560" width="900" height="560" font-family="'PingFang SC','Microsoft YaHei','Hiragino Sans GB','Noto Sans CJK SC',sans-serif">
  <defs>
    <filter id="cardShadow" x="-8%" y="-8%" width="116%" height="120%">
      <feDropShadow dx="0" dy="6" stdDeviation="14" flood-color="#0B1F33" flood-opacity="0.10"/>
    </filter>
    <linearGradient id="brand" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0F766E"/>
      <stop offset="1" stop-color="#0D9488"/>
    </linearGradient>
  </defs>

  <!-- canvas -->
  <rect x="0" y="0" width="900" height="560" fill="#FFFFFF"/>
  <rect x="12" y="12" width="876" height="536" rx="22" fill="#FFFFFF" stroke="#E6E8EB" filter="url(#cardShadow)"/>

  <!-- header -->
  <circle cx="48" cy="50" r="14" fill="url(#brand)"/>
  <path d="M41 50 l5 5 l9 -10" fill="none" stroke="#FFFFFF" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="72" y="56" font-size="21" font-weight="700" fill="#111827">电子军师</text>
  <text x="852" y="56" font-size="14" fill="#9AA3AF" text-anchor="end">演示 · 暧昧期</text>
  <line x1="36" y1="80" x2="864" y2="80" stroke="#EEF0F2" stroke-width="1"/>

  <!-- step labels -->
  <text x="36" y="112" font-size="15" font-weight="600" fill="#6B7280">① 你贴进来的微信截图</text>
  <text x="448" y="112" font-size="15" font-weight="600" fill="#6B7280">② 三条能直接发的回复</text>

  <!-- LEFT: chat screenshot mockup -->
  <rect x="36" y="124" width="356" height="404" rx="20" fill="#F4F6F9" stroke="#E6E8EB"/>
  <!-- chat top bar -->
  <path d="M64 150 l-8 7 l8 7" fill="none" stroke="#9AA3AF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="214" y="162" font-size="15" font-weight="600" fill="#1F2937" text-anchor="middle">小美</text>
  <circle cx="248" cy="157" r="3" fill="#07C160"/>
  <line x1="56" y1="178" x2="372" y2="178" stroke="#E9EBEE" stroke-width="1"/>

  <!-- bubble: me (sent) -->
  <rect x="196" y="200" width="176" height="40" rx="13" fill="#95EC69"/>
  <text x="284" y="225" font-size="14.5" fill="#16321A" text-anchor="middle">周末爬山去了，腿废了</text>

  <!-- bubble: ta (received) — the one we answer -->
  <circle cx="62" cy="286" r="15" fill="#D7B98E"/>
  <text x="62" y="291" font-size="13" fill="#5B4A33" text-anchor="middle" font-weight="700">美</text>
  <rect x="86" y="270" width="150" height="40" rx="13" fill="#FFFFFF" stroke="#ECECEC"/>
  <text x="100" y="295" font-size="14.5" fill="#1F2937">你最近忙什么呢</text>
  <text x="214" y="338" font-size="12" fill="#A8B0B8" text-anchor="middle">刚刚</text>

  <!-- faux input bar -->
  <rect x="56" y="470" width="316" height="38" rx="19" fill="#FFFFFF" stroke="#E2E5E9"/>
  <text x="78" y="494" font-size="13.5" fill="#A8B0B8">截图、聊天记录，丢进来就行</text>
  <circle cx="353" cy="489" r="14" fill="#07C160"/>
  <path d="M347 489 h11 M354 484 l5 5 l-5 5" fill="none" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- arrow -->
  <circle cx="420" cy="320" r="19" fill="url(#brand)"/>
  <path d="M414 320 h10 M420 314 l6 6 l-6 6" fill="none" stroke="#FFFFFF" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- RIGHT: three replies -->
  <!-- card 1: 稳妥版 -->
  <rect x="448" y="124" width="404" height="120" rx="14" fill="#FFFFFF" stroke="#E6E8EB"/>
  <rect x="448" y="124" width="5" height="120" rx="2.5" fill="#2BB673"/>
  <text x="470" y="152" font-size="15.5" font-weight="700" fill="#0F766E">稳妥版</text>
  <rect x="752" y="135" width="84" height="22" rx="11" fill="#E7F5EE"/>
  <text x="794" y="150" font-size="12" font-weight="600" fill="#0F766E" text-anchor="middle">油腻度 0.5/5</text>
  <text x="470" y="182" font-size="15" fill="#1F2937">刚忙完个项目，这两天在补觉。你呢</text>
  <text x="470" y="222" font-size="12.5" fill="#9AA3AF">稳，不急着表现，留对话余地</text>

  <!-- card 2: 会撩版 -->
  <rect x="448" y="256" width="404" height="120" rx="14" fill="#FFFFFF" stroke="#E6E8EB"/>
  <rect x="448" y="256" width="5" height="120" rx="2.5" fill="#E8A33D"/>
  <text x="470" y="284" font-size="15.5" font-weight="700" fill="#B45309">会撩版</text>
  <rect x="752" y="267" width="84" height="22" rx="11" fill="#FDF1E3"/>
  <text x="794" y="282" font-size="12" font-weight="600" fill="#B45309" text-anchor="middle">油腻度 1.5/5</text>
  <text x="470" y="314" font-size="15" fill="#1F2937">忙着把日子过得有意思点，</text>
  <text x="470" y="338" font-size="15" fill="#1F2937">顺便等个有趣的人来问我</text>
  <text x="470" y="362" font-size="12.5" fill="#9AA3AF">留个钩子，ta 接不接都不尴尬</text>

  <!-- card 3: 展示自己版 -->
  <rect x="448" y="388" width="404" height="120" rx="14" fill="#FFFFFF" stroke="#E6E8EB"/>
  <rect x="448" y="388" width="5" height="120" rx="2.5" fill="#3B82F6"/>
  <text x="470" y="416" font-size="15.5" font-weight="700" fill="#1D4ED8">展示自己版</text>
  <rect x="762" y="399" width="74" height="22" rx="11" fill="#E8F0FE"/>
  <text x="799" y="414" font-size="12" font-weight="600" fill="#1D4ED8" text-anchor="middle">油腻度 1/5</text>
  <text x="470" y="446" font-size="15" fill="#1F2937">周末爬山去了，山顶风景绝了。</text>
  <text x="470" y="470" font-size="15" fill="#1F2937">你周末一般怎么过</text>
  <text x="470" y="494" font-size="12.5" fill="#9AA3AF">亮一下生活，再把球抛回给 ta</text>
</svg>
