<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 484" width="900" height="484" font-family="'PingFang SC','Microsoft YaHei','Hiragino Sans GB','Noto Sans CJK SC',sans-serif">
  <defs>
    <filter id="ts" x="-8%" y="-8%" width="116%" height="120%">
      <feDropShadow dx="0" dy="6" stdDeviation="14" flood-color="#0B1F33" flood-opacity="0.10"/>
    </filter>
    <linearGradient id="tb" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0F766E"/>
      <stop offset="1" stop-color="#0D9488"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="900" height="484" fill="#FFFFFF"/>
  <rect x="12" y="12" width="876" height="460" rx="22" fill="#FFFFFF" stroke="#E6E8EB" filter="url(#ts)"/>

  <!-- header -->
  <circle cx="48" cy="50" r="14" fill="url(#tb)"/>
  <path d="M41 50 l5 5 l9 -10" fill="none" stroke="#FFFFFF" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="72" y="56" font-size="21" font-weight="700" fill="#111827">电子军师</text>
  <text x="852" y="56" font-size="14" fill="#9AA3AF" text-anchor="end">演示 · 识破套路</text>
  <line x1="36" y1="80" x2="864" y2="80" stroke="#EEF0F2" stroke-width="1"/>

  <!-- chat evidence -->
  <rect x="36" y="96" width="828" height="96" rx="14" fill="#F4F6F9" stroke="#E6E8EB"/>
  <circle cx="64" cy="150" r="15" fill="#D7B98E"/>
  <text x="64" y="155" font-size="13" fill="#5B4A33" text-anchor="middle" font-weight="700">美</text>
  <rect x="88" y="114" width="196" height="34" rx="12" fill="#FFFFFF" stroke="#ECECEC"/>
  <text x="104" y="136" font-size="14.5" fill="#1F2937">改天一定约你！</text>
  <text x="828" y="136" font-size="12.5" fill="#A8B0B8" text-anchor="end">上周</text>
  <rect x="88" y="154" width="232" height="34" rx="12" fill="#FFFFFF" stroke="#ECECEC"/>
  <text x="104" y="176" font-size="14.5" fill="#1F2937">下次带你去那家店～</text>
  <text x="828" y="176" font-size="12.5" fill="#A8B0B8" text-anchor="end">今天</text>

  <!-- verdict -->
  <rect x="36" y="206" width="828" height="78" rx="14" fill="#FFF7F1" stroke="#F6D9C6"/>
  <rect x="36" y="206" width="5" height="78" rx="2.5" fill="#E8A33D"/>
  <circle cx="72" cy="245" r="15" fill="#E8A33D"/>
  <rect x="70.6" y="237" width="2.8" height="10" rx="1.4" fill="#FFFFFF"/>
  <circle cx="72" cy="252" r="1.8" fill="#FFFFFF"/>
  <text x="98" y="240" font-size="16" font-weight="700" fill="#B45309">识破：画饼（只说不做）</text>
  <text x="98" y="266" font-size="14" fill="#5B4636">三次「改天 / 下次」，一次都没定时间。先别为这句上头。</text>

  <!-- moves -->
  <text x="36" y="314" font-size="14" font-weight="600" fill="#6B7280">帮你接：</text>

  <rect x="36" y="326" width="404" height="98" rx="14" fill="#FFFFFF" stroke="#E6E8EB"/>
  <rect x="36" y="326" width="5" height="98" rx="2.5" fill="#3B82F6"/>
  <text x="58" y="354" font-size="15" font-weight="700" fill="#1D4ED8">不接招</text>
  <text x="58" y="384" font-size="15" fill="#1F2937">行啊，你定好了叫我</text>
  <text x="58" y="408" font-size="12.5" fill="#9AA3AF">把球轻轻推回去，看 ta 接不接</text>

  <rect x="460" y="326" width="404" height="98" rx="14" fill="#FFFFFF" stroke="#E6E8EB"/>
  <rect x="460" y="326" width="5" height="98" rx="2.5" fill="#0D9488"/>
  <text x="482" y="354" font-size="15" font-weight="700" fill="#0F766E">拿回主动</text>
  <text x="482" y="384" font-size="15" fill="#1F2937">最近挺忙，你定了再说</text>
  <text x="482" y="408" font-size="12.5" fill="#9AA3AF">收回注意力，别追着帮 ta 定</text>

  <!-- foreshadow footnote -->
  <text x="40" y="452" font-size="13" fill="#0F766E">埋个伏笔：下次聊到那家店先种个草，到时候你更好开口约。</text>
</svg>
