<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1040 430" width="1040" height="430" font-family="'PingFang SC','Microsoft YaHei','Hiragino Sans GB','Noto Sans CJK SC',sans-serif">
  <defs>
    <filter id="hs" x="-4%" y="-4%" width="108%" height="116%">
      <feDropShadow dx="0" dy="4" stdDeviation="9" flood-color="#0B1F33" flood-opacity="0.08"/>
    </filter>
    <linearGradient id="hb" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0F766E"/>
      <stop offset="1" stop-color="#0D9488"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="1040" height="430" fill="#FFFFFF"/>

  <!-- header -->
  <circle cx="44" cy="46" r="13" fill="url(#hb)"/>
  <path d="M37.5 46 l4.5 4.5 l8.5 -9.5" fill="none" stroke="#FFFFFF" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="66" y="52" font-size="20" font-weight="700" fill="#111827">电子军师</text>
  <text x="1016" y="52" font-size="14" fill="#9AA3AF" text-anchor="end">它每次都这么想</text>
  <line x1="32" y1="74" x2="1008" y2="74" stroke="#EEF0F2" stroke-width="1"/>

  <!-- input card -->
  <rect x="24" y="100" width="110" height="144" rx="14" fill="#F4F6F9" stroke="#E6E8EB"/>
  <text x="79" y="128" font-size="13.5" font-weight="700" fill="#6B7280" text-anchor="middle">你丢进来</text>
  <rect x="43" y="144" width="72" height="22" rx="11" fill="#FFFFFF" stroke="#E2E5E9"/>
  <text x="79" y="159" font-size="12" fill="#4B5563" text-anchor="middle">微信截图</text>
  <rect x="43" y="172" width="72" height="22" rx="11" fill="#FFFFFF" stroke="#E2E5E9"/>
  <text x="79" y="187" font-size="12" fill="#4B5563" text-anchor="middle">聊天记录</text>
  <rect x="43" y="200" width="72" height="22" rx="11" fill="#FFFFFF" stroke="#E2E5E9"/>
  <text x="79" y="215" font-size="12" fill="#4B5563" text-anchor="middle">朋友圈</text>

  <!-- step cards -->
  <g>
    <rect x="152" y="100" width="170" height="144" rx="14" fill="#FFFFFF" stroke="#E6E8EB" filter="url(#hs)"/>
    <circle cx="178" cy="130" r="14" fill="url(#hb)"/><text x="178" y="135" font-size="13" font-weight="700" fill="#FFFFFF" text-anchor="middle">1</text>
    <text x="200" y="135" font-size="15" font-weight="700" fill="#111827">读懂场景</text>
    <text x="170" y="166" font-size="12.5" fill="#6B7280">调出 ta 的档案</text>
    <text x="170" y="188" font-size="12.5" fill="#6B7280">看现在几点</text>
    <text x="170" y="210" font-size="12.5" fill="#6B7280">先摘原文，不瞎猜</text>
  </g>
  <g>
    <rect x="340" y="100" width="170" height="144" rx="14" fill="#FFFFFF" stroke="#E6E8EB" filter="url(#hs)"/>
    <circle cx="366" cy="130" r="14" fill="url(#hb)"/><text x="366" y="135" font-size="13" font-weight="700" fill="#FFFFFF" text-anchor="middle">2</text>
    <text x="388" y="135" font-size="15" font-weight="700" fill="#111827">三层解读</text>
    <text x="358" y="166" font-size="12.5" fill="#6B7280">表面说了啥</text>
    <text x="358" y="188" font-size="12.5" fill="#6B7280">是什么情绪</text>
    <text x="358" y="210" font-size="12.5" fill="#6B7280">真正想要啥</text>
  </g>
  <g>
    <rect x="528" y="100" width="170" height="144" rx="14" fill="#FFFFFF" stroke="#E6E8EB" filter="url(#hs)"/>
    <circle cx="554" cy="130" r="14" fill="url(#hb)"/><text x="554" y="135" font-size="13" font-weight="700" fill="#FFFFFF" text-anchor="middle">3</text>
    <text x="576" y="135" font-size="15" font-weight="700" fill="#111827">盘算分寸</text>
    <text x="546" y="166" font-size="12.5" fill="#6B7280">有没有意思</text>
    <text x="546" y="188" font-size="12.5" fill="#6B7280">是不是套路</text>
    <text x="546" y="210" font-size="12.5" fill="#6B7280">这阶段能多油</text>
  </g>
  <g>
    <rect x="716" y="100" width="170" height="144" rx="14" fill="#FFFFFF" stroke="#E6E8EB" filter="url(#hs)"/>
    <circle cx="742" cy="130" r="14" fill="url(#hb)"/><text x="742" y="135" font-size="13" font-weight="700" fill="#FFFFFF" text-anchor="middle">4</text>
    <text x="764" y="135" font-size="15" font-weight="700" fill="#111827">给你话</text>
    <text x="734" y="166" font-size="12.5" fill="#6B7280">三条能发的回复</text>
    <text x="734" y="188" font-size="12.5" fill="#6B7280">再过一遍</text>
    <text x="734" y="210" font-size="12.5" fill="#6B7280">像不像真人发的</text>
  </g>

  <!-- output card -->
  <rect x="904" y="100" width="112" height="144" rx="14" fill="#F3FBF6" stroke="#DCEFE4"/>
  <text x="960" y="128" font-size="13.5" font-weight="700" fill="#0F766E" text-anchor="middle">你拿到</text>
  <text x="960" y="166" font-size="14" fill="#16321A" text-anchor="middle">三条回复</text>
  <text x="960" y="192" font-size="14" fill="#16321A" text-anchor="middle">＋ 旁白提醒</text>

  <!-- chevrons -->
  <g fill="none" stroke="#0D9488" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round" opacity="0.7">
    <path d="M138 165 l8 7 l-8 7"/>
    <path d="M326 165 l8 7 l-8 7"/>
    <path d="M514 165 l8 7 l-8 7"/>
    <path d="M702 165 l8 7 l-8 7"/>
    <path d="M890 165 l8 7 l-8 7"/>
  </g>

  <!-- memory box -->
  <rect x="24" y="302" width="992" height="68" rx="14" fill="#F0F7F6" stroke="#CFE3E0"/>
  <ellipse cx="58" cy="324" rx="13" ry="4.5" fill="#0D9488"/>
  <rect x="45" y="324" width="26" height="24" fill="#0F766E"/>
  <ellipse cx="58" cy="348" rx="13" ry="4.5" fill="#0F766E"/>
  <ellipse cx="58" cy="324" rx="13" ry="4.5" fill="#0D9488"/>
  <text x="86" y="330" font-size="14.5" font-weight="700" fill="#0F766E">长期记忆 · 每个对象一份档案</text>
  <text x="86" y="354" font-size="12.5" fill="#5A6B68">阶段、说话习惯、哪招对 ta 管用都存着；你给反馈或纠正，它就更新。</text>

  <!-- loop arrows -->
  <path d="M237 300 L237 250" fill="none" stroke="#0F766E" stroke-width="1.8" stroke-dasharray="4 4"/>
  <path d="M232 256 L237 249 L242 256" fill="none" stroke="#0F766E" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="248" y="278" font-size="11.5" fill="#0F766E">开工先载入档案</text>

  <path d="M960 248 L960 300" fill="none" stroke="#9AA3AF" stroke-width="1.8" stroke-dasharray="4 4"/>
  <path d="M955 294 L960 301 L965 294" fill="none" stroke="#9AA3AF" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="948" y="278" font-size="11.5" fill="#6B7280" text-anchor="end">你发完，反馈写回</text>

  <text x="520" y="402" font-size="13" fill="#6B7280" text-anchor="middle">越用越准，换个窗口也记得 ta</text>
</svg>
