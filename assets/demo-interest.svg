<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 440" width="900" height="440" font-family="'PingFang SC','Microsoft YaHei','Hiragino Sans GB','Noto Sans CJK SC',sans-serif">
  <defs>
    <filter id="is" x="-8%" y="-8%" width="116%" height="120%">
      <feDropShadow dx="0" dy="6" stdDeviation="14" flood-color="#0B1F33" flood-opacity="0.10"/>
    </filter>
    <linearGradient id="ib" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0F766E"/>
      <stop offset="1" stop-color="#0D9488"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="900" height="440" fill="#FFFFFF"/>
  <rect x="12" y="12" width="876" height="416" rx="22" fill="#FFFFFF" stroke="#E6E8EB" filter="url(#is)"/>

  <!-- header -->
  <circle cx="48" cy="50" r="14" fill="url(#ib)"/>
  <path d="M41 50 l5 5 l9 -10" fill="none" stroke="#FFFFFF" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="72" y="56" font-size="21" font-weight="700" fill="#111827">电子军师</text>
  <text x="852" y="56" font-size="14" fill="#9AA3AF" text-anchor="end">演示 · 反舔狗模式 开</text>
  <line x1="36" y1="80" x2="864" y2="80" stroke="#EEF0F2" stroke-width="1"/>

  <!-- left: score -->
  <text x="36" y="116" font-size="15" font-weight="600" fill="#6B7280">ta 对你有多少意思</text>
  <text x="36" y="184" font-size="62" font-weight="800" fill="#0F766E">4</text>
  <text x="98" y="184" font-size="24" font-weight="600" fill="#9AA3AF">/10</text>
  <rect x="208" y="150" width="84" height="24" rx="12" fill="#F1F3F5"/>
  <text x="250" y="166" font-size="12.5" font-weight="600" fill="#6B7280" text-anchor="middle">置信度 中</text>
  <rect x="36" y="208" width="360" height="12" rx="6" fill="#EEF1F4"/>
  <rect x="36" y="208" width="144" height="12" rx="6" fill="#E8A33D"/>
  <text x="36" y="246" font-size="14.5" font-weight="600" fill="#B45309">礼貌回复多，主动太少，兴趣偏低</text>

  <!-- right: evidence -->
  <text x="430" y="116" font-size="14" font-weight="700" fill="#1E9E6A">加分</text>
  <g font-size="13.5" fill="#374151">
    <circle cx="436" cy="143" r="8" fill="#E7F5EE"/><path d="M432 143 h8 M436 139 v8" stroke="#1E9E6A" stroke-width="1.6" stroke-linecap="round"/>
    <text x="452" y="148">会主动分享生活</text>
    <circle cx="436" cy="171" r="8" fill="#E7F5EE"/><path d="M432 171 h8 M436 167 v8" stroke="#1E9E6A" stroke-width="1.6" stroke-linecap="round"/>
    <text x="452" y="176">接住过你的玩笑</text>
    <circle cx="436" cy="199" r="8" fill="#E7F5EE"/><path d="M432 199 h8 M436 195 v8" stroke="#1E9E6A" stroke-width="1.6" stroke-linecap="round"/>
    <text x="452" y="204">偶尔会反问你</text>
  </g>
  <text x="648" y="116" font-size="14" font-weight="700" fill="#D9534F">减分</text>
  <g font-size="13.5" fill="#374151">
    <circle cx="654" cy="143" r="8" fill="#FCEBEA"/><path d="M650 143 h8" stroke="#D9534F" stroke-width="1.6" stroke-linecap="round"/>
    <text x="670" y="148">约两次都没定下来</text>
    <circle cx="654" cy="171" r="8" fill="#FCEBEA"/><path d="M650 171 h8" stroke="#D9534F" stroke-width="1.6" stroke-linecap="round"/>
    <text x="670" y="176">常用"在忙"收尾</text>
    <circle cx="654" cy="199" r="8" fill="#FCEBEA"/><path d="M650 199 h8" stroke="#D9534F" stroke-width="1.6" stroke-linecap="round"/>
    <text x="670" y="204">很少主动找你</text>
  </g>

  <!-- anti-simp callout -->
  <rect x="36" y="288" width="816" height="120" rx="16" fill="#FFF7F1" stroke="#F6D9C6"/>
  <rect x="36" y="288" width="5" height="120" rx="2.5" fill="#E8A33D"/>
  <circle cx="74" cy="322" r="15" fill="#E8A33D"/>
  <rect x="69" y="315" width="3.4" height="14" rx="1.7" fill="#FFFFFF"/>
  <rect x="76" y="315" width="3.4" height="14" rx="1.7" fill="#FFFFFF"/>
  <text x="102" y="320" font-size="16" font-weight="700" fill="#B45309">反舔狗模式 · 先收一下</text>
  <text x="102" y="350" font-size="14" fill="#5B4636">连着两次约见面都没定下来，主动权一直在你这边。</text>
  <text x="102" y="378" font-size="14" fill="#5B4636">先把注意力收回来，别再追问行程，过两天看 ta 会不会自己冒头。</text>
</svg>
