<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 470" width="900" height="470" font-family="'PingFang SC','Microsoft YaHei','Hiragino Sans GB','Noto Sans CJK SC',sans-serif">
  <defs>
    <filter id="cardShadow" x="-8%" y="-8%" width="116%" height="120%">
      <feDropShadow dx="0" dy="6" stdDeviation="14" flood-color="#0B1F33" flood-opacity="0.10"/>
    </filter>
    <linearGradient id="brand" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0F766E"/>
      <stop offset="1" stop-color="#0D9488"/>
    </linearGradient>
  </defs>

  <rect x="0" y="0" width="900" height="470" fill="#FFFFFF"/>
  <rect x="12" y="12" width="876" height="446" rx="22" fill="#FFFFFF" stroke="#E6E8EB" filter="url(#cardShadow)"/>

  <!-- header -->
  <circle cx="48" cy="50" r="14" fill="url(#brand)"/>
  <path d="M41 50 l5 5 l9 -10" fill="none" stroke="#FFFFFF" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="72" y="56" font-size="21" font-weight="700" fill="#111827">人话门禁</text>
  <text x="852" y="56" font-size="14" fill="#9AA3AF" text-anchor="end">每条可复制回复，先过闸再见人</text>
  <line x1="36" y1="80" x2="864" y2="80" stroke="#EEF0F2" stroke-width="1"/>

  <!-- LEFT: draft (fails) -->
  <text x="36" y="116" font-size="15" font-weight="600" fill="#6B7280">初稿 · 一眼长辈</text>
  <rect x="36" y="130" width="360" height="300" rx="16" fill="#FDF6F6" stroke="#F2D9D9"/>
  <rect x="60" y="156" width="292" height="44" rx="13" fill="#FFFFFF" stroke="#EBD5D5"/>
  <text x="76" y="184" font-size="14.5" fill="#4B5563">天冷了，多喝热水，注意保暖。</text>

  <rect x="60" y="224" width="132" height="24" rx="12" fill="#FCE9E9"/>
  <text x="126" y="241" font-size="12" font-weight="600" fill="#B42318" text-anchor="middle">FAIL 句尾句号</text>
  <rect x="200" y="224" width="150" height="24" rx="12" fill="#FCE9E9"/>
  <text x="275" y="241" font-size="12" font-weight="600" fill="#B42318" text-anchor="middle">FAIL 叮嘱式关怀</text>
  <rect x="60" y="256" width="160" height="24" rx="12" fill="#FCE9E9"/>
  <text x="140" y="273" font-size="12" font-weight="600" fill="#B42318" text-anchor="middle">FAIL 全套书面标点</text>

  <text x="60" y="316" font-size="13" fill="#8A5A5A">句尾句号 = 冷漠/生气信号</text>
  <text x="60" y="340" font-size="13" fill="#8A5A5A">「多喝热水」= 敷衍关怀反面教材</text>
  <text x="60" y="364" font-size="13" fill="#8A5A5A">整句公文腔，像长辈不像同龄人</text>
  <text x="60" y="404" font-size="12.5" fill="#B98A8A">改写优先动：标点 → 拆条 → 姿态</text>

  <!-- MIDDLE: the gate -->
  <rect x="416" y="216" width="88" height="88" rx="20" fill="url(#brand)"/>
  <path d="M436 260 l10 10 l20 -22" fill="none" stroke="#FFFFFF" stroke-width="3.4" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="460" y="330" font-size="13" font-weight="700" fill="#0F766E" text-anchor="middle">voice_lint.py</text>
  <text x="460" y="350" font-size="12" fill="#6B7280" text-anchor="middle">＋ 自检清单</text>
  <text x="460" y="370" font-size="12" fill="#6B7280" text-anchor="middle">最多修 2 轮</text>
  <path d="M400 260 h12 M492 260 h20 M512 260 l-6 -6 M512 260 l-6 6" fill="none" stroke="#0F766E" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- RIGHT: passed -->
  <text x="540" y="116" font-size="15" font-weight="600" fill="#6B7280">过闸版 · 像随手打的</text>
  <rect x="540" y="130" width="324" height="300" rx="16" fill="#F2FBF7" stroke="#CBEBDD"/>
  <rect x="564" y="160" width="164" height="42" rx="13" fill="#95EC69"/>
  <text x="580" y="187" font-size="14.5" fill="#16321A">冷死了吧今天</text>
  <rect x="564" y="214" width="184" height="42" rx="13" fill="#95EC69"/>
  <text x="580" y="241" font-size="14.5" fill="#16321A">给你点杯热的？</text>

  <rect x="564" y="282" width="96" height="24" rx="12" fill="#DCF3EA"/>
  <text x="612" y="299" font-size="12" font-weight="600" fill="#0F766E" text-anchor="middle">PASS 无句号</text>
  <rect x="668" y="282" width="86" height="24" rx="12" fill="#DCF3EA"/>
  <text x="711" y="299" font-size="12" font-weight="600" fill="#0F766E" text-anchor="middle">PASS 拆条</text>
  <rect x="564" y="314" width="140" height="24" rx="12" fill="#DCF3EA"/>
  <text x="634" y="331" font-size="12" font-weight="600" fill="#0F766E" text-anchor="middle">PASS 具体动作关心</text>

  <text x="564" y="372" font-size="13" fill="#4E7A68">同样的关心，换成年轻人的说法：</text>
  <text x="564" y="394" font-size="13" fill="#4E7A68">吐槽共情 ＋ 一个可接可不接的行动</text>
</svg>
