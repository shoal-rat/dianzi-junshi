<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="430" viewBox="0 0 1200 430" role="img" aria-labelledby="title desc">
  <title id="title">电子军师三步上手</title>
  <desc id="desc">下载安装，导入资料，获得回复并记录真实结果。</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0d1917"/>
      <stop offset="1" stop-color="#152521"/>
    </linearGradient>
    <linearGradient id="mint" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#7de0c2"/>
      <stop offset="1" stop-color="#4fb99c"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#000" flood-opacity=".26"/>
    </filter>
  </defs>
  <rect width="1200" height="430" rx="34" fill="url(#bg)"/>
  <text x="58" y="62" fill="#f5f8f7" font-family="system-ui,-apple-system,sans-serif" font-size="28" font-weight="700">第一次使用，只要三步</text>
  <text x="58" y="94" fill="#9eb2ad" font-family="system-ui,-apple-system,sans-serif" font-size="16">不需要数据库知识，也不用打开终端</text>

  <g filter="url(#shadow)">
    <rect x="54" y="132" width="326" height="238" rx="26" fill="#192b27" stroke="#2f4d45"/>
    <circle cx="104" cy="182" r="26" fill="url(#mint)"/>
    <text x="104" y="190" text-anchor="middle" fill="#0d1917" font-family="system-ui,sans-serif" font-size="22" font-weight="800">1</text>
    <path d="M179 173h70v56h-70zM164 238h100" fill="none" stroke="#7de0c2" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M214 153v49m-18-18 18 18 18-18" fill="none" stroke="#7de0c2" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="82" y="291" fill="#f4f7f6" font-family="system-ui,-apple-system,sans-serif" font-size="24" font-weight="700">下载安装</text>
    <text x="82" y="326" fill="#a9bbb6" font-family="system-ui,-apple-system,sans-serif" font-size="16">选 Windows、macOS 或 Linux</text>
    <text x="82" y="349" fill="#a9bbb6" font-family="system-ui,-apple-system,sans-serif" font-size="16">对应的文件，双击打开</text>
  </g>

  <path d="M398 252h42" stroke="#4d6f66" stroke-width="5" stroke-linecap="round"/>
  <path d="m430 240 14 12-14 12" fill="none" stroke="#4d6f66" stroke-width="5" stroke-linecap="round"/>

  <g filter="url(#shadow)">
    <rect x="438" y="132" width="326" height="238" rx="26" fill="#192b27" stroke="#2f4d45"/>
    <circle cx="488" cy="182" r="26" fill="url(#mint)"/>
    <text x="488" y="190" text-anchor="middle" fill="#0d1917" font-family="system-ui,sans-serif" font-size="22" font-weight="800">2</text>
    <rect x="558" y="158" width="92" height="84" rx="12" fill="none" stroke="#7de0c2" stroke-width="7"/>
    <circle cx="582" cy="183" r="9" fill="#7de0c2"/>
    <path d="m566 227 25-25 18 17 14-12 19 20" fill="none" stroke="#7de0c2" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M675 176h39M675 200h39M675 224h27" stroke="#6c9f91" stroke-width="7" stroke-linecap="round"/>
    <text x="466" y="291" fill="#f4f7f6" font-family="system-ui,-apple-system,sans-serif" font-size="24" font-weight="700">建立聊天档案</text>
    <text x="466" y="326" fill="#a9bbb6" font-family="system-ui,-apple-system,sans-serif" font-size="16">一次选很多张截图也可以</text>
    <text x="466" y="349" fill="#a9bbb6" font-family="system-ui,-apple-system,sans-serif" font-size="16">后台逐张整理，并显示进度</text>
  </g>

  <path d="M782 252h42" stroke="#4d6f66" stroke-width="5" stroke-linecap="round"/>
  <path d="m814 240 14 12-14 12" fill="none" stroke="#4d6f66" stroke-width="5" stroke-linecap="round"/>

  <g filter="url(#shadow)">
    <rect x="822" y="132" width="324" height="238" rx="26" fill="#192b27" stroke="#2f4d45"/>
    <circle cx="872" cy="182" r="26" fill="url(#mint)"/>
    <text x="872" y="190" text-anchor="middle" fill="#0d1917" font-family="system-ui,sans-serif" font-size="22" font-weight="800">3</text>
    <path d="M938 163h122a17 17 0 0 1 17 17v49a17 17 0 0 1-17 17h-65l-25 20 4-20h-36a17 17 0 0 1-17-17v-49a17 17 0 0 1 17-17Z" fill="none" stroke="#7de0c2" stroke-width="7" stroke-linejoin="round"/>
    <circle cx="963" cy="205" r="6" fill="#7de0c2"/><circle cx="992" cy="205" r="6" fill="#7de0c2"/><circle cx="1021" cy="205" r="6" fill="#7de0c2"/>
    <path d="m1060 262 10 10 21-24" fill="none" stroke="#f0c36b" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="850" y="291" fill="#f4f7f6" font-family="system-ui,-apple-system,sans-serif" font-size="24" font-weight="700">复制，再看后来</text>
    <text x="850" y="326" fill="#a9bbb6" font-family="system-ui,-apple-system,sans-serif" font-size="16">选一句自然的话直接发送</text>
    <text x="850" y="349" fill="#a9bbb6" font-family="system-ui,-apple-system,sans-serif" font-size="16">结果会让以后判断更贴近现实</text>
